# CherryClaw ← 天机v9.1 记忆接入配置文件
# 自动生成于: 2026-06-14
# 版本: v10-ready

[tianji]
# 天机项目路径
project_root = D:\元初系统\天机v9.1

# Python解释器
python_exe = D:\元初系统\天机v9.1\python\python.exe

# 数据路径
data_path = D:\元初系统\天机v9.1\data\.memory

# 启动脚本
startup_script = D:\元初系统\天机v9.1\start_cherryclaw.py

[memory]
# ICME六层配置
enabled = true
auto_start = true
protocol_mode = false

# 功能开关
enable_llm = true           # DeepSeek LLM增强
enable_quality_gate = true   # 质量门禁
enable_dual_process = true   # 双过程固结 (L3→L4)
enable_cascade_invalidation = true  # 级联失效

# 自动路由
auto_route = true
default_layer = working

# 对话捕获
conversation_capture = true
conversation_dual_write = true  # L0+sensory + L1+working

# 层级参数
[memory.layers.sensory]
max_entries = 5000
capacity_threshold = 0.8

[memory.layers.working]
max_entries = 2000
capacity_threshold = 0.7

[memory.layers.short_term]
max_entries = 3000
capacity_threshold = 0.8

[memory.layers.episodic]
max_entries = 2000
capacity_threshold = 0.9

[memory.layers.semantic]
max_entries = 1000
capacity_threshold = 0.9

[memory.layers.meta]
max_entries = 500
capacity_threshold = 0.5
