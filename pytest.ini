[pytest]
testpaths = tests
python_files = test_*.py *_test.py benchmark_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    sss: SSS级关键测试

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
